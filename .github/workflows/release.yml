name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Release Metadata
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate version and updater config
        run: node ./scripts/ci/verify-release.mjs "${GITHUB_REF_NAME}"

      - name: Validate macOS signing and notarization secrets
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
        run: bash ./scripts/ci/verify-macos-signing-secrets.sh

      - name: Detect prerelease tag
        id: meta
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  checks:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm type-check

      - name: Test
        run: pnpm test:unit

  build:
    name: Build (${{ matrix.target }})
    needs: [validate, checks]
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            go_os: darwin
            go_arch: arm64
            sidecar_name: hexclaw-aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            go_os: darwin
            go_arch: amd64
            sidecar_name: hexclaw-x86_64-apple-darwin
            tauri_args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            go_os: linux
            go_arch: amd64
            sidecar_name: hexclaw-x86_64-unknown-linux-gnu
            tauri_args: ''
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            go_os: windows
            go_arch: amd64
            sidecar_name: hexclaw-x86_64-pc-windows-msvc.exe
            tauri_args: --target x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # --- Go sidecar build ---
      - name: Checkout hexclaw backend
        uses: actions/checkout@v4
        with:
          repository: hexagon-codes/hexclaw
          path: hexclaw

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: hexclaw/go.sum

      - name: Configure private modules
        run: |
          if [ -n "${{ secrets.PRIVATE_REPO_TOKEN }}" ]; then
            git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"
          fi

      - name: Build hexclaw sidecar
        env:
          GOOS: ${{ matrix.go_os }}
          GOARCH: ${{ matrix.go_arch }}
          CGO_ENABLED: '0'
          GOPRIVATE: github.com/hexagon-codes/*
        run: |
          mkdir -p src-tauri/binaries
          cd hexclaw && go build -ldflags="-s -w" -o ../src-tauri/binaries/${{ matrix.sidecar_name }} ./cmd/hexclaw

      # --- Frontend & Tauri build ---
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile

      - name: Prepare App Store Connect private key
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          if [[ -n "${APPLE_API_KEY}" && -n "${APPLE_API_PRIVATE_KEY}" ]]; then
            mkdir -p private_keys
            printf '%s' "${APPLE_API_PRIVATE_KEY}" > "private_keys/AuthKey_${APPLE_API_KEY}.p8"
            echo "Prepared App Store Connect private key."
          else
            echo "Skipping App Store Connect private key preparation."
          fi

      - name: Disable updater artifacts when signing key is unavailable
        run: |
          node -e "const fs=require('fs'); const path='src-tauri/tauri.conf.json'; const cfg=JSON.parse(fs.readFileSync(path,'utf8')); if (!process.env.TAURI_SIGNING_PRIVATE_KEY) { cfg.bundle = { ...(cfg.bundle || {}), createUpdaterArtifacts: false }; fs.writeFileSync(path, JSON.stringify(cfg, null, 2) + '\n'); console.log('Disabled updater artifacts for unsigned release build.'); } else { console.log('Keeping updater artifacts enabled.'); }"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Resolve Tauri bundle args
        id: tauri_args
        shell: bash
        run: |
          args="${{ matrix.tauri_args }}"
          if [[ "${{ matrix.target }}" == "x86_64-pc-windows-msvc" && "${{ needs.validate.outputs.prerelease }}" == "true" ]]; then
            args="$args --bundles nsis"
          fi
          echo "args=$args" >> "$GITHUB_OUTPUT"

      - name: Check if Apple signing secrets are available
        id: signing
        run: |
          if [[ -n "${{ secrets.APPLE_CERTIFICATE }}" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Apple signing secrets not configured — building unsigned"
          fi

      - name: Build Tauri app (signed)
        if: steps.signing.outputs.available == 'true'
        uses: tauri-apps/tauri-action@action-v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'HexClaw Desktop ${{ github.ref_name }}'
          releaseBody: |
            See the generated release notes below for changes in this version.
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: ${{ needs.validate.outputs.prerelease == 'true' }}
          args: ${{ steps.tauri_args.outputs.args }}
          retryAttempts: 2

      - name: Build Tauri app (unsigned)
        if: steps.signing.outputs.available != 'true'
        uses: tauri-apps/tauri-action@action-v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'HexClaw Desktop ${{ github.ref_name }}'
          releaseBody: |
            See the generated release notes below for changes in this version.
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: ${{ needs.validate.outputs.prerelease == 'true' }}
          args: ${{ steps.tauri_args.outputs.args }}
          retryAttempts: 2

      - name: Verify macOS bundle
        if: matrix.platform == 'macos-latest'
        run: bash ./scripts/ci/verify-macos-bundle.sh "${{ matrix.target }}"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hexclaw-${{ github.ref_name }}-${{ matrix.target }}
          if-no-files-found: error
          path: |
            ${{ startsWith(matrix.target, 'aarch64-apple-darwin') && 'src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg' || '' }}
            ${{ startsWith(matrix.target, 'x86_64-apple-darwin') && 'src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg' || '' }}
            ${{ matrix.target == 'x86_64-unknown-linux-gnu' && 'src-tauri/target/release/bundle/appimage/*.AppImage' || '' }}
            ${{ matrix.target == 'x86_64-unknown-linux-gnu' && 'src-tauri/target/release/bundle/deb/*.deb' || '' }}
            ${{ matrix.target == 'x86_64-pc-windows-msvc' && 'src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe' || '' }}
            ${{ matrix.target == 'x86_64-pc-windows-msvc' && needs.validate.outputs.prerelease != 'true' && 'src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi' || '' }}

  update-tap:
    name: Update Homebrew Tap
    needs: [validate, build]
    if: needs.validate.outputs.prerelease != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for release assets to be available
        run: sleep 30

      - name: Download macOS DMGs and compute SHA256
        id: sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          REPO="hexagon-codes/hexclaw-desktop"

          for ARCH in aarch64 x86_64; do
            DMG="HexClaw_${VERSION}_${ARCH}.dmg"
            URL="https://github.com/${REPO}/releases/download/${TAG}/${DMG}"
            echo "Downloading ${DMG}..."
            curl -fSL -o "/tmp/${DMG}" "$URL" || { echo "::warning::DMG not found: ${DMG}, using :no_check"; continue; }
            SHA=$(sha256sum "/tmp/${DMG}" | awk '{print $1}')
            echo "SHA256 (${ARCH}): ${SHA}"
            echo "sha_${ARCH}=${SHA}" >> "$GITHUB_OUTPUT"
          done
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: hexagon-codes/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update Cask
        run: |
          VERSION="${{ steps.sha.outputs.version }}"
          SHA_ARM="${{ steps.sha.outputs.sha_aarch64 }}"
          SHA_INTEL="${{ steps.sha.outputs.sha_x86_64 }}"
          CASK="homebrew-tap/Casks/hexclaw.rb"

          sed -i "s/^  version \".*\"/  version \"${VERSION}\"/" "$CASK"

          if [[ -n "$SHA_ARM" ]]; then
            sed -i "/on_arm/,/end/{s/sha256 .*/sha256 \"${SHA_ARM}\"/;}" "$CASK"
          fi
          if [[ -n "$SHA_INTEL" ]]; then
            sed -i "/on_intel/,/end/{s/sha256 .*/sha256 \"${SHA_INTEL}\"/;}" "$CASK"
          fi

          echo "Updated Cask to ${VERSION}"
          cat "$CASK"

      - name: Push to homebrew-tap
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump hexclaw to ${{ steps.sha.outputs.version }}"
          git push
