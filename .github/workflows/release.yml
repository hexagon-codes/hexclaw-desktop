name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Release Metadata
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate version and updater config
        run: node ./scripts/ci/verify-release.mjs "${GITHUB_REF_NAME}"

      - name: Detect prerelease tag
        id: meta
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  checks:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm type-check

      - name: Test
        run: pnpm test:unit

  build:
    name: Build (${{ matrix.target }})
    needs: [validate, checks]
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            go_os: darwin
            go_arch: arm64
            sidecar_name: hexclaw-aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            go_os: darwin
            go_arch: amd64
            sidecar_name: hexclaw-x86_64-apple-darwin
            tauri_args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            go_os: linux
            go_arch: amd64
            sidecar_name: hexclaw-x86_64-unknown-linux-gnu
            tauri_args: ''
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            go_os: windows
            go_arch: amd64
            sidecar_name: hexclaw-x86_64-pc-windows-msvc.exe
            tauri_args: --target x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # --- Go sidecar build ---
      - name: Checkout hexclaw backend
        uses: actions/checkout@v4
        with:
          repository: hexagon-codes/hexclaw
          path: hexclaw

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: hexclaw/go.sum

      - name: Configure private modules
        run: |
          if [ -n "${{ secrets.PRIVATE_REPO_TOKEN }}" ]; then
            git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"
          fi

      - name: Build hexclaw sidecar
        env:
          GOOS: ${{ matrix.go_os }}
          GOARCH: ${{ matrix.go_arch }}
          CGO_ENABLED: '0'
          GOPRIVATE: github.com/hexagon-codes/*
        run: |
          mkdir -p src-tauri/binaries
          cd hexclaw && go build -ldflags="-s -w" -o ../src-tauri/binaries/${{ matrix.sidecar_name }} ./cmd/hexclaw

      # --- Frontend & Tauri build ---
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile

      - name: Disable updater artifacts when signing key is unavailable
        run: |
          node -e "const fs=require('fs'); const path='src-tauri/tauri.conf.json'; const cfg=JSON.parse(fs.readFileSync(path,'utf8')); if (!process.env.TAURI_SIGNING_PRIVATE_KEY) { cfg.bundle = { ...(cfg.bundle || {}), createUpdaterArtifacts: false }; fs.writeFileSync(path, JSON.stringify(cfg, null, 2) + '\n'); console.log('Disabled updater artifacts for unsigned release build.'); } else { console.log('Keeping updater artifacts enabled.'); }"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Prepare macOS signing env
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE_INPUT: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD_INPUT: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY_INPUT: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID_INPUT: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD_INPUT: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID_INPUT: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          disable_signing() {
            echo "MACOS_SIGNING_ENABLED=false" >> "$GITHUB_ENV"
            for key in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
              echo "${key}=" >> "$GITHUB_ENV"
            done
          }

          export_secret() {
            local key="$1"
            local value="$2"
            {
              echo "${key}<<EOF"
              printf '%s\n' "$value"
              echo "EOF"
            } >> "$GITHUB_ENV"
          }

          if [ -z "${APPLE_CERTIFICATE_INPUT:-}" ] || [ -z "${APPLE_CERTIFICATE_PASSWORD_INPUT:-}" ] || [ -z "${APPLE_SIGNING_IDENTITY_INPUT:-}" ]; then
            echo "macOS signing secrets are incomplete; building unsigned macOS bundles."
            disable_signing
            exit 0
          fi

          cert_file="$RUNNER_TEMP/hexclaw-signing-cert.p12"
          keychain="$RUNNER_TEMP/hexclaw-signing.keychain-db"
          rm -f "$cert_file"
          security delete-keychain "$keychain" >/dev/null 2>&1 || true

          if ! printf '%s' "$APPLE_CERTIFICATE_INPUT" | base64 --decode > "$cert_file" 2>/dev/null; then
            echo "APPLE_CERTIFICATE is not valid base64; building unsigned macOS bundles."
            disable_signing
            exit 0
          fi

          security create-keychain -p "" "$keychain"
          security set-keychain-settings "$keychain"

          if ! security import "$cert_file" -k "$keychain" -P "$APPLE_CERTIFICATE_PASSWORD_INPUT" -T /usr/bin/codesign -T /usr/bin/security >/dev/null 2>&1; then
            echo "APPLE_CERTIFICATE could not be imported; building unsigned macOS bundles."
            disable_signing
            security delete-keychain "$keychain" >/dev/null 2>&1 || true
            exit 0
          fi

          security delete-keychain "$keychain" >/dev/null 2>&1 || true

          echo "MACOS_SIGNING_ENABLED=true" >> "$GITHUB_ENV"
          export_secret APPLE_CERTIFICATE "$APPLE_CERTIFICATE_INPUT"
          export_secret APPLE_CERTIFICATE_PASSWORD "$APPLE_CERTIFICATE_PASSWORD_INPUT"
          export_secret APPLE_SIGNING_IDENTITY "$APPLE_SIGNING_IDENTITY_INPUT"
          export_secret APPLE_ID "${APPLE_ID_INPUT:-}"
          export_secret APPLE_PASSWORD "${APPLE_PASSWORD_INPUT:-}"
          export_secret APPLE_TEAM_ID "${APPLE_TEAM_ID_INPUT:-}"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@action-v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing
          APPLE_CERTIFICATE: ${{ env.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ env.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ env.APPLE_ID }}
          APPLE_PASSWORD: ${{ env.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
          # Tauri updater signing
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'HexClaw Desktop ${{ github.ref_name }}'
          releaseBody: |
            See the generated release notes below for changes in this version.
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: ${{ needs.validate.outputs.prerelease == 'true' }}
          args: ${{ matrix.tauri_args }}
          retryAttempts: 2

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hexclaw-${{ github.ref_name }}-${{ matrix.target }}
          if-no-files-found: error
          path: |
            ${{ startsWith(matrix.target, 'aarch64-apple-darwin') && 'src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg' || '' }}
            ${{ startsWith(matrix.target, 'x86_64-apple-darwin') && 'src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg' || '' }}
            ${{ matrix.target == 'x86_64-unknown-linux-gnu' && 'src-tauri/target/release/bundle/appimage/*.AppImage' || '' }}
            ${{ matrix.target == 'x86_64-unknown-linux-gnu' && 'src-tauri/target/release/bundle/deb/*.deb' || '' }}
            ${{ matrix.target == 'x86_64-pc-windows-msvc' && 'src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe' || '' }}
            ${{ matrix.target == 'x86_64-pc-windows-msvc' && 'src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi' || '' }}
