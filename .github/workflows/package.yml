name: Package

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to package (branch, tag, or commit SHA)
        required: false
        default: main

permissions:
  contents: read

concurrency:
  group: package-${{ inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  checks:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm type-check

      - name: Test
        run: pnpm test:unit

  build:
    name: Package (${{ matrix.target }})
    needs: checks
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            go_os: darwin
            go_arch: arm64
            sidecar_name: hexclaw-aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            go_os: darwin
            go_arch: amd64
            sidecar_name: hexclaw-x86_64-apple-darwin
            tauri_args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            go_os: linux
            go_arch: amd64
            sidecar_name: hexclaw-x86_64-unknown-linux-gnu
            tauri_args: ''
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            go_os: windows
            go_arch: amd64
            sidecar_name: hexclaw-x86_64-pc-windows-msvc.exe
            tauri_args: --target x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Checkout hexclaw backend
        uses: actions/checkout@v4
        with:
          repository: hexagon-codes/hexclaw
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: hexclaw

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: hexclaw/go.sum

      - name: Configure private modules
        run: |
          git config --global url."https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Build hexclaw sidecar
        env:
          GOOS: ${{ matrix.go_os }}
          GOARCH: ${{ matrix.go_arch }}
          CGO_ENABLED: '0'
          GOPRIVATE: github.com/hexagon-codes/*
        run: |
          mkdir -p src-tauri/binaries
          cd hexclaw && go build -ldflags="-s -w" -o ../src-tauri/binaries/${{ matrix.sidecar_name }} ./cmd/hexclaw

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri packages
        uses: tauri-apps/tauri-action@action-v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.tauri_args }}
          retryAttempts: 2
          uploadUpdaterJson: false
          uploadUpdaterSignatures: false
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: 'hexclaw-[platform]-[arch]-[bundle]'
