<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HexClaw</title>
    <style>
      /* Splash screen — follows system appearance, rendered before JS loads */
      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #f5f5f7;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display',
          'Helvetica Neue', 'PingFang SC', sans-serif;
        -webkit-font-smoothing: antialiased;
        transition: opacity 0.5s cubic-bezier(0.2, 0, 0, 1);
        user-select: none;
        -webkit-user-select: none;
      }
      #splash-screen.fade-out { opacity: 0; pointer-events: none; }

      .splash-logo {
        width: 96px;
        height: 96px;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08), 0 0 0 0.5px rgba(0, 0, 0, 0.06);
      }
      .splash-logo img { width: 100%; height: 100%; object-fit: cover; }

      .splash-title {
        margin-top: 16px;
        font-size: 17px;
        font-weight: 600;
        color: rgba(0, 0, 0, 0.85);
        letter-spacing: -0.01em;
      }

      .splash-spinner {
        margin-top: 32px;
        width: 20px;
        height: 20px;
        border: 2px solid rgba(0, 0, 0, 0.08);
        border-top-color: rgba(0, 0, 0, 0.4);
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
      }
      @keyframes splash-spin { to { transform: rotate(360deg); } }

      /* Dark mode — match app dark theme */
      @media (prefers-color-scheme: dark) {
        #splash-screen { background: #161722; }
        .splash-logo { box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3), 0 0 0 0.5px rgba(255, 255, 255, 0.06); }
        .splash-title { color: rgba(255, 255, 255, 0.85); }
        .splash-spinner { border-color: rgba(255, 255, 255, 0.08); border-top-color: rgba(255, 255, 255, 0.4); }
      }
    </style>
  </head>
  <body>
    <!-- Splash screen: visible immediately, removed after Vue mounts -->
    <div id="splash-screen">
      <div class="splash-logo">
        <img src="/logo.png" alt="HexClaw" />
      </div>
      <div class="splash-title">HexClaw</div>
      <div class="splash-spinner"></div>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
