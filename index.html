<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HexClaw</title>
    <style>
      /* Splash screen — rendered before any JS loads */
      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #161722;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display',
          'Helvetica Neue', 'PingFang SC', sans-serif;
        -webkit-font-smoothing: antialiased;
        transition: opacity 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        user-select: none;
        -webkit-user-select: none;
      }
      #splash-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .splash-logo {
        width: 88px;
        height: 88px;
        border-radius: 22px;
        background: linear-gradient(135deg, #4a90d9, #5a9ee5);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow:
          0 12px 40px rgba(74, 144, 217, 0.3),
          0 0 0 1px rgba(255, 255, 255, 0.06);
        animation: splash-breathe 2.4s ease-in-out infinite;
      }
      @keyframes splash-breathe {
        0%, 100% { transform: scale(1); box-shadow: 0 12px 40px rgba(74,144,217,0.3), 0 0 0 1px rgba(255,255,255,0.06); }
        50% { transform: scale(1.03); box-shadow: 0 16px 48px rgba(74,144,217,0.38), 0 0 0 1px rgba(255,255,255,0.08); }
      }

      .splash-title {
        margin-top: 20px;
        font-size: 18px;
        font-weight: 700;
        color: #f0f0f3;
        letter-spacing: -0.02em;
      }

      .splash-subtitle {
        margin-top: 6px;
        font-size: 12px;
        color: #5c5c6b;
        letter-spacing: 0.02em;
      }

      .splash-bar-track {
        margin-top: 28px;
        width: 160px;
        height: 3px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.06);
        overflow: hidden;
      }
      .splash-bar-fill {
        width: 40%;
        height: 100%;
        border-radius: 2px;
        background: linear-gradient(90deg, #4a90d9, #5a9ee5);
        animation: splash-slide 1.4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      @keyframes splash-slide {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(400%); }
      }
    </style>
  </head>
  <body>
    <!-- Splash screen: visible immediately, removed after Vue mounts -->
    <div id="splash-screen">
      <div class="splash-logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <path d="M24 4L42 14V34L24 44L6 34V14L24 4Z" stroke="white" stroke-width="2.2" stroke-linejoin="round" fill="rgba(255,255,255,0.12)"/>
          <path d="M24 14L33 19.2V29.8L24 35L15 29.8V19.2L24 14Z" stroke="white" stroke-width="1.6" stroke-linejoin="round" fill="rgba(255,255,255,0.08)"/>
          <circle cx="24" cy="24.5" r="3.5" fill="white" opacity="0.9"/>
        </svg>
      </div>
      <div class="splash-title">HexClaw</div>
      <div class="splash-subtitle">正在启动...</div>
      <div class="splash-bar-track">
        <div class="splash-bar-fill"></div>
      </div>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
